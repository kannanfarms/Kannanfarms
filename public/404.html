<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting... — Kannan Farms</title>
  <script type="text/javascript">
    // Strip trailing slash if present
    var path = window.location.pathname;
    if (path.length > 1 && path.endsWith('/')) {
      path = path.slice(0, -1);
    }
    
    var search = window.location.search;
    var hash = window.location.hash;
    
    // Redirect to the hash router route
    if (path.includes('/product/')) {
      var slug = path.split('/product/')[1];
      window.location.replace('/#/product/' + slug + search + hash);
    } else if (path.endsWith('/cart')) {
      window.location.replace('/#/cart' + search + hash);
    } else if (path.endsWith('/profile')) {
      window.location.replace('/#/profile' + search + hash);
    } else if (path.endsWith('/admin')) {
      window.location.replace('/#/admin' + search + hash);
    } else if (path.endsWith('/banana') || path.endsWith('/banana.html')) {
      window.location.replace('/#/product/banana-powder' + search + hash);
    } else if (path.endsWith('/moringa') || path.endsWith('/moringa.html')) {
      window.location.replace('/#/product/moringa-powder' + search + hash);
    } else if (path.endsWith('/contact') || path.endsWith('/contact.html')) {
      window.location.replace('/#/?scroll=contact' + search + hash);
    } else {
      // Fallback redirect to home page
      window.location.replace('/#' + path + search + hash);
    }
  </script>
</head>
<body>
  <p>Redirecting you... If you are not redirected, <a href="/#/">click here to return to Home</a>.</p>
</body>
</html>
